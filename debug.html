<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Debug OpenSky</title>
  <style>
    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Monaco', 'Courier New', monospace;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: #4CAF50;
      margin-bottom: 20px;
    }

    .controls {
      background: #2a2a2a;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid #444;
    }

    .input-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
      font-family: inherit;
    }

    button {
      padding: 8px 16px;
      background: #4CAF50;
      border: none;
      border-radius: 4px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
    }

    .output {
      background: #0a0a0a;
      border: 1px solid #4CAF50;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 12px;
    }

    .loading {
      color: #4CAF50;
    }

    .error {
      color: #ff6b6b;
    }

    .success {
      color: #4CAF50;
    }

    .info {
      color: #4CAF50;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .stats {
      background: #2a2a2a;
      border: 1px solid #4CAF50;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 20px;
    }

    .stat-item {
      display: inline-block;
      margin-right: 20px;
      color: #4CAF50;
    }
  </style>
</head>
<body>

<h1>🔧 Debug OpenSky Network</h1>

<div class="controls">
  <div class="input-group">
    <input type="text" id="lat" placeholder="Latitud (ej: 42.24)" value="42.24">
    <input type="text" id="lon" placeholder="Longitud (ej: -8.72)" value="-8.72">
    <button id="getGps">📍 Obtener GPS actual</button>
    <button id="test">🔍 Testear OpenSky</button>
  </div>
  <div class="info">
    Hace una llamada a OpenSky Network para el área especificada (±1.5 grados)
  </div>
</div>

<div id="stats" class="stats" style="display:none;"></div>

<div id="output" class="output">Esperando input...</div>

<script>
  const latInput = document.getElementById('lat');
  const lonInput = document.getElementById('lon');
  const testBtn = document.getElementById('test');
  const gpsBtn = document.getElementById('getGps');
  const output = document.getElementById('output');
  const stats = document.getElementById('stats');

  gpsBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
      output.innerHTML = '<span class="error">❌ Geolocation no disponible en este navegador</span>';
      return;
    }

    gpsBtn.disabled = true;
    gpsBtn.textContent = '⏳ Obteniendo...';

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        latInput.value = pos.coords.latitude.toFixed(4);
        lonInput.value = pos.coords.longitude.toFixed(4);
        output.innerHTML = `<span class="success">✅ GPS obtenido: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}</span>`;
        gpsBtn.disabled = false;
        gpsBtn.textContent = '📍 Obtener GPS actual';
      },
      (err) => {
        output.innerHTML = `<span class="error">❌ Error: ${err.message}</span>`;
        gpsBtn.disabled = false;
        gpsBtn.textContent = '📍 Obtener GPS actual';
      }
    );
  });

  testBtn.addEventListener('click', async () => {
    const lat = latInput.value;
    const lon = lonInput.value;

    if (!lat || !lon) {
      output.innerHTML = '<span class="error">❌ Falta latitud o longitud</span>';
      return;
    }

    testBtn.disabled = true;
    output.innerHTML = '<span class="loading">⏳ Consultando OpenSky...</span>';
    stats.style.display = 'none';

    try {
      const url = `/api/debug?lat=${lat}&lon=${lon}`;
      const r = await fetch(url);
      const data = await r.json();

      if (data.error) {
        output.innerHTML = `<span class="error">❌ Error: ${data.error}</span>\n\n${JSON.stringify(data, null, 2)}`;
      } else {
        // Mostrar stats
        const statsHtml = `
          <span class="stat-item">📊 Total: <strong>${data.stats.total_states}</strong></span>
          <span class="stat-item">✈️ En vuelo: <strong>${data.stats.in_flight}</strong></span>
          <span class="stat-item">📍 Con altitud: <strong>${data.stats.with_altitude}</strong></span>
          <span class="stat-item">🌍 Con posición: <strong>${data.stats.with_position}</strong></span>
        `;
        stats.innerHTML = statsHtml;
        stats.style.display = 'block';

        output.innerHTML = `<span class="success">✅ OpenSky respondió correctamente\n\n</span>${JSON.stringify(data, null, 2)}`;
      }
    } catch (e) {
      output.innerHTML = `<span class="error">❌ Error de conexión: ${e.message}</span>`;
    } finally {
      testBtn.disabled = false;
    }
  });

  // Test automático al cargar
  window.addEventListener('load', () => {
    output.innerHTML = '<span class="info">ℹ️ Carga la página y haz clic en "Testear OpenSky" o primero obtén tu GPS actual</span>';
  });
</script>
</body>
</html>
