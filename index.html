<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radar Estelas - Avión real</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .gear-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1001;
            border: 1px solid #4ade80;
            font-size: 26px;
            color: #4ade80;
        }
        .locate-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1001;
            border: 1px solid #4ade80;
            font-size: 24px;
            color: #4ade80;
        }
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 14px 18px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 260px;
            display: none;
        }
        .control-panel.visible { display: block; }
        .panel-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .panel-header h3 {
            font-size: 1.2rem;
            color: #4ade80;
        }
        .close-panel {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .info-label { color: #aaa; }
        .info-value { font-weight: 600; color: white; }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #333;
            font-size: 0.7rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
<div id="map"></div>
<div class="gear-btn" id="gearBtn"><i class="fas fa-cog"></i></div>
<div class="locate-btn" id="locateBtn"><i class="fas fa-crosshairs"></i></div>
<div class="control-panel" id="controlPanel">
    <div class="panel-header">
        <h3><i class="fas fa-plane"></i> Radar Estelas</h3>
        <button class="close-panel" id="closePanelBtn">&times;</button>
    </div>
    <div class="info-row">
        <span class="info-label">📍 Tu posición:</span>
        <span class="info-value" id="posText">--</span>
    </div>
    <div class="info-row">
        <span class="info-label">✈️ Aviones en zona:</span>
        <span class="info-value" id="planeCount">0</span>
    </div>
    <div class="info-row">
        <span class="info-label">🔍 Radio (zoom):</span>
        <span class="info-value" id="radioValue">-- km</span>
    </div>
    <div class="info-row">
        <span class="info-label">🔄 Última búsqueda:</span>
        <span class="info-value" id="updateTime">--</span>
    </div>
    <div class="legend">
        <div style="width:100%; margin-bottom:5px;"><strong>Probabilidad de estelas</strong></div>
        <div class="legend-item"><div class="legend-color" style="background:#00ff00;"></div><span>Nula</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ffff00;"></div><span>Baja</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff9800;"></div><span>Media</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff5722;"></div><span>Alta</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff0000;"></div><span>Muy Alta</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#888888;"></div><span>Sin datos</span></div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
    let map, userLocation, userMarker, aircraftMarkers = new Map(), weatherCache = new Map();
    let isUpdating = false, currentMapCenter = null, firstLocationFix = true;
    const MIN_ALT = 6000;
    function getRadiusFromZoom(z) { return Math.max(30, Math.min(500, Math.round(400 / (z - 3)))); }
    const pressLevels = [{press:500,alt_m:5574},{press:400,alt_m:7185},{press:300,alt_m:9164},{press:250,alt_m:10363},{press:200,alt_m:11784},{press:150,alt_m:13608},{press:100,alt_m:16184},{press:70,alt_m:18513},{press:50,alt_m:20600}];
    const usable = pressLevels.filter(l=>l.press>=70);
    const riskColors = {'NULA':'#00ff00','BAJA':'#ffff00','MEDIA':'#ff9800','ALTA':'#ff5722','MUY ALTA':'#ff0000','SIN DATOS':'#888888'};
    function toRHi(RHw,T){let ew=6.1078*Math.exp(17.269*T/(T+237.29)),ei=6.1078*Math.exp(21.875*T/(T+265.5));return(RHw/100)*(ew/ei)*100;}
    function classifyRisk(T,RH){if(T==null||RH==null)return'SIN DATOS';if(T>-40)return'NULA';let RHi=toRHi(RH,T),ts=T<=-50?3:T<=-45?2:1,rs=RHi>=110?4:RHi>=100?3:RHi>=95?2:RHi>=90?1:0,cpi=ts+rs;if(cpi>=6)return'MUY ALTA';if(cpi>=5)return'ALTA';if(cpi>=3)return'MEDIA';if(cpi>=1)return'BAJA';return'NULA';}
    async function fetchWeather(lat,lon){let key=lat.toFixed(3)+'_'+lon.toFixed(3),now=Date.now();if(weatherCache.has(key)){let c=weatherCache.get(key);if(now-c.timestamp<300000)return c.data;}try{let vars=usable.map(l=>`temperature_${l.press}hPa`).join(','),rhvars=usable.map(l=>`relative_humidity_${l.press}hPa`).join(','),url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=${vars},${rhvars}&timezone=UTC&forecast_days=1`;let r=await fetch(url);if(!r.ok)throw new Error();let d=await r.json(),hora=new Date().getUTCHours(),wb={};for(let l of usable){let ta=d.hourly[`temperature_${l.press}hPa`],ra=d.hourly[`relative_humidity_${l.press}hPa`];wb[l.press]={temp:ta?.[hora]??null,rh:ra?.[hora]??null,alt_m:l.alt_m};}let res={weatherByPressure:wb,timestamp:now};weatherCache.set(key,{data:res,timestamp:now});return res;}catch(e){return null;}}
    function interpolateWeather(alt,wd){if(!wd?.weatherByPressure)return null;let lev=Object.entries(wd.weatherByPressure).map(([p,i])=>({press:parseInt(p),alt_m:i.alt_m,temp:i.temp,rh:i.rh})).sort((a,b)=>a.alt_m-b.alt_m);if(!lev.length)return null;if(alt<=lev[0].alt_m)return lev[0];if(alt>=lev[lev.length-1].alt_m)return lev[lev.length-1];for(let i=0;i<lev.length-1;i++){let lo=lev[i],hi=lev[i+1];if(alt>=lo.alt_m&&alt<=hi.alt_m){let r=(alt-lo.alt_m)/(hi.alt_m-lo.alt_m),temp=lo.temp!=null&&hi.temp!=null?lo.temp+r*(hi.temp-lo.temp):null,rh=lo.rh!=null&&hi.rh!=null?lo.rh+r*(hi.rh-lo.rh):null;return{temp,rh,alt_m:alt,press:`${lo.press}-${hi.press}`};}}return null;}
    async function getRisk(lat,lon,alt){let w=await fetchWeather(lat,lon);if(!w)return{risk:'SIN DATOS',temp:null,rh:null};let res=interpolateWeather(alt,w);if(!res||res.temp==null||res.rh==null)return{risk:'SIN DATOS',temp:null,rh:null};return{risk:classifyRisk(res.temp,res.rh),temp:res.temp,rh:res.rh};}
    async function fetchPlanes(lat,lon,radKm){let radNm=Math.min(radKm*0.539957,250),url=`https://api.airplanes.live/v2/point/${lat}/${lon}/${radNm}`;try{let r=await fetch(url);if(!r.ok)return[];let d=await r.json();if(!d?.ac)return[];return d.ac.filter(p=>p.lat&&p.lon&&(p.alt_baro||p.alt_geom));}catch(e){return[];}}
    function getPlaneIcon(color,heading){let h=heading&&!isNaN(heading)?heading:0;let corrected=(h+90)%360;let html=`<div style="transform: rotate(${corrected}deg); transform-origin: center center; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;"><i class="fas fa-plane" style="font-size: 28px; color: ${color}; text-shadow: 0 0 1px black;"></i></div>`;return L.divIcon({html:html,iconSize:[32,32],popupAnchor:[0,-16]});}
    async function refreshAt(lat,lon,zoom){if(isUpdating)return;let rad=getRadiusFromZoom(zoom);document.getElementById('radioValue').innerText=rad+' km';isUpdating=true;try{let list=await fetchPlanes(lat,lon,rad),enriched=[];for(let p of list){let alt=p.alt_baro||p.alt_geom||10000;if(p.alt_baro&&p.alt_baro<60000&&p.alt_baro>0)alt=p.alt_baro*0.3048;else if(p.alt_geom&&p.alt_geom<20000)alt=p.alt_geom;if(alt<MIN_ALT)continue;let riskData=await getRisk(p.lat,p.lon,alt);enriched.push({id:p.hex||`${p.lat}_${p.lon}`,lat:p.lat,lon:p.lon,altitudeM:alt,flight:p.flight||'N/A',heading:p.track||0,risk:riskData.risk,temp:riskData.temp,rh:riskData.rh});}updateMarkers(enriched);document.getElementById('planeCount').innerText=enriched.length;document.getElementById('updateTime').innerHTML=new Date().toLocaleTimeString('es');}catch(e){}finally{isUpdating=false;}}
    function updateMarkers(list){let ids=new Set(list.map(a=>a.id));for(let[id,obj]of aircraftMarkers.entries())if(!ids.has(id)){map.removeLayer(obj.marker);aircraftMarkers.delete(id);}for(let p of list){let color=riskColors[p.risk]||riskColors['SIN DATOS'],icon=getPlaneIcon(color,p.heading),popup=`<div><b>✈️ ${p.flight}</b><br>Alt: ${Math.round(p.altitudeM)} m<br>Temp: ${p.temp?.toFixed(1)??'N/D'}°C<br>Riesgo: <span style="color:${color}">${p.risk}</span></div>`;if(aircraftMarkers.has(p.id)){let ex=aircraftMarkers.get(p.id);ex.marker.setLatLng([p.lat,p.lon]);ex.marker.setIcon(icon);ex.marker.bindPopup(popup);}else{let m=L.marker([p.lat,p.lon],{icon}).bindPopup(popup).addTo(map);aircraftMarkers.set(p.id,{marker:m});}}}
    function initMap(){map=L.map('map',{zoomControl:false}).setView([42.24,-8.72],8);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OSM'}).addTo(map);map.on('moveend',async()=>{let c=map.getCenter(),z=map.getZoom();currentMapCenter={lat:c.lat,lon:c.lng};await refreshAt(c.lat,c.lng,z);});map.on('zoomend',async()=>{let c=map.getCenter(),z=map.getZoom();currentMapCenter={lat:c.lat,lon:c.lng};await refreshAt(c.lat,c.lng,z);});}
    function initGeo(){if(!navigator.geolocation){document.getElementById('posText').innerText='No soportado';return;}navigator.geolocation.watchPosition(async(p)=>{let{latitude,longitude}=p.coords;userLocation={lat:latitude,lon:longitude};document.getElementById('posText').innerHTML=`${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;if(userMarker)map.removeLayer(userMarker);userMarker=L.circleMarker([latitude,longitude],{radius:10,fillColor:'#3b82f6',color:'#fff',weight:2,fillOpacity:0.9}).bindPopup('📍 Tu posición').addTo(map);if(firstLocationFix){map.setView([latitude,longitude],9);firstLocationFix=false;let z=map.getZoom();currentMapCenter={lat:latitude,lon:longitude};await refreshAt(latitude,longitude,z);}else if(!currentMapCenter){let z=map.getZoom();currentMapCenter={lat:latitude,lon:longitude};await refreshAt(latitude,longitude,z);}},(err)=>{document.getElementById('posText').innerText='Permiso denegado';if(!currentMapCenter){let z=map.getZoom();currentMapCenter={lat:42.24,lon:-8.72};refreshAt(42.24,-8.72,z);}},{enableHighAccuracy:true,maximumAge:20000,timeout:10000});}
    document.getElementById('gearBtn').onclick=()=>document.getElementById('controlPanel').classList.toggle('visible');
    document.getElementById('closePanelBtn').onclick=()=>document.getElementById('controlPanel').classList.remove('visible');
    document.getElementById('locateBtn').onclick=async()=>{if(userLocation){map.setView([userLocation.lat,userLocation.lon],9);let z=map.getZoom();currentMapCenter={lat:userLocation.lat,lon:userLocation.lon};await refreshAt(userLocation.lat,userLocation.lon,z);}else alert('Esperando ubicación...');};
    initMap(); initGeo();
    setInterval(()=>{if(currentMapCenter){let z=map.getZoom();refreshAt(currentMapCenter.lat,currentMapCenter.lon,z);}},10000);
    setInterval(()=>weatherCache.clear(),600000);
</script>
</body>
</html>
