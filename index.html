<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radar Estelas 2.0 - Aviones en tiempo real</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111;
            color: #eee;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }

        /* Panel de control moderno */
        .control-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 16px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: auto;
            font-size: 14px;
            max-width: 320px;
        }

        @media (min-width: 768px) {
            .control-panel {
                top: 20px;
                left: 20px;
                right: auto;
                min-width: 280px;
            }
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }

        .panel-header h3 {
            font-size: 1.2rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            font-size: 0.7rem;
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 30px;
            color: #aaa;
        }

        .status-badge.active {
            background: #1e3a2f;
            color: #4ade80;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .info-label {
            color: #aaa;
        }

        .info-value {
            font-weight: 600;
            color: white;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #333;
            font-size: 0.7rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .debug {
            font-size: 0.7rem;
            color: #777;
            margin-top: 8px;
            text-align: center;
            word-break: break-word;
        }

        button {
            background: #2a5c8a;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }

        button:hover {
            background: #1e4a76;
        }

        .footer-note {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #888;
            background: rgba(0,0,0,0.5);
            padding: 4px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel">
    <div class="panel-header">
        <h3>🛰️ Radar Estelas 2.0</h3>
        <div class="status-badge" id="statusBadge">Iniciando...</div>
    </div>
    <div class="info-row">
        <span class="info-label">📍 Tu posición:</span>
        <span class="info-value" id="posText">--</span>
    </div>
    <div class="info-row">
        <span class="info-label">✈️ Aviones detectados:</span>
        <span class="info-value" id="planeCount">0</span>
    </div>
    <div class="info-row">
        <span class="info-label">🔄 Última actualización:</span>
        <span class="info-value" id="updateTime">--</span>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#00ff00;"></div><span>Nula</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ffff00;"></div><span>Baja</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff9800;"></div><span>Media</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff5722;"></div><span>Alta</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff0000;"></div><span>Muy Alta</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#888888;"></div><span>Sin datos</span></div>
    </div>
    <div class="debug" id="debugInfo">
        ℹ️ Usando api.airplanes.live (real) + Open-Meteo
    </div>
</div>
<div class="footer-note">
    Datos de vuelo: airplanes.live | Meteorología: Open-Meteo
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
    // ================= CONFIGURACIÓN =================
    const RADIO_KM = 120;          // Radio de búsqueda en kilómetros (ajústalo entre 80 y 180)
    const REFRESH_MS = 5000;       // Actualización cada 5 segundos
    const WEATHER_CACHE_TTL = 300000; // 5 minutos de caché meteorológico por coordenada
    
    // Mapa inicial (centro provisional)
    const map = L.map('map').setView([40.4167, -3.70325], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
        subdomains: 'abcd',
        maxZoom: 19,
        minZoom: 5
    }).addTo(map);
    
    // Variables de estado
    let userLocation = null;
    let userMarker = null;
    let aircraftMarkers = new Map();   // guarda los marcadores activos
    let weatherCache = new Map();       // caché de datos meteoro por "lat,lon"
    let updateInterval = null;
    let isUpdating = false;
    
    // Colores según clasificación de estelas
    const riskColors = {
        'NULA': '#00ff00',
        'BAJA': '#ffff00',
        'MEDIA': '#ff9800',
        'ALTA': '#ff5722',
        'MUY ALTA': '#ff0000',
        'SIN DATOS': '#888888'
    };
    
    // ----- Funciones de cálculo de estelas (fórmulas originales) -----
    function toRHi(RHw, T_C) {
        const ew = 6.1078 * Math.exp(17.269 * T_C / (T_C + 237.29));
        const ei = 6.1078 * Math.exp(21.875 * T_C / (T_C + 265.5));
        return (RHw / 100) * (ew / ei) * 100;
    }
    
    function classifyRisk(T, RHw) {
        if (T === null || RHw === null) return 'SIN DATOS';
        if (T > -40) return 'NULA';
        const RHi = toRHi(RHw, T);
        const ts = T <= -50 ? 3 : T <= -45 ? 2 : 1;
        const rs = RHi >= 110 ? 4 : RHi >= 100 ? 3 : RHi >= 95 ? 2 : RHi >= 90 ? 1 : 0;
        const cpi = ts + rs;
        if (cpi >= 6) return 'MUY ALTA';
        if (cpi >= 5) return 'ALTA';
        if (cpi >= 3) return 'MEDIA';
        if (cpi >= 1) return 'BAJA';
        return 'NULA';
    }
    
    // ----- Conversión de altitud (pies a metros) y nivel de presión aproximado para Open-Meteo -----
    function getPressureLevelFromAltitude(meters) {
        // Relación aproximada: niveles de presión estándar.
        if (meters >= 11500) return 200;   // ~200 hPa (12 km)
        if (meters >= 10500) return 225;   // ~225 hPa (11 km)
        return 275;                        // ~275 hPa (10 km)
    }
    
    // ----- Obtener datos meteorológicos (temperatura y humedad) para un punto y altitud -----
    async function fetchWeatherForAircraft(lat, lon, altMeters) {
        const cacheKey = `${lat.toFixed(2)}_${lon.toFixed(2)}_${Math.floor(altMeters / 1000)}`;
        const now = Date.now();
        if (weatherCache.has(cacheKey)) {
            const cached = weatherCache.get(cacheKey);
            if (now - cached.timestamp < WEATHER_CACHE_TTL) {
                return cached.data;
            }
        }
        
        try {
            const pressureLevel = getPressureLevelFromAltitude(altMeters);
            // Elegimos las variables según el nivel de presión
            let tempVar, rhVar;
            if (pressureLevel === 200) {
                tempVar = "temperature_200hPa";
                rhVar = "relative_humidity_200hPa";
            } else if (pressureLevel === 225) {
                tempVar = "temperature_225hPa";
                rhVar = "relative_humidity_225hPa";
            } else {
                tempVar = "temperature_275hPa";
                rhVar = "relative_humidity_275hPa";
            }
            
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=${tempVar},${rhVar}&timezone=UTC&forecast_days=1`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Weather API error: ${response.status}`);
            const data = await response.json();
            
            if (!data.hourly) throw new Error("No hourly data");
            
            // Cogemos el primer dato (tiempo actual UTC)
            const temp = data.hourly[tempVar]?.[0] ?? null;
            const rh = data.hourly[rhVar]?.[0] ?? null;
            
            const result = { temp, rh, pressureLevel };
            weatherCache.set(cacheKey, { data: result, timestamp: now });
            return result;
        } catch (err) {
            console.warn(`Weather fetch failed (${lat},${lon}):`, err);
            return null;
        }
    }
    
    // ----- Obtener aviones desde airplanes.live -----
    // Convierte kilómetros a millas náuticas (radio de búsqueda)
    function kmToNm(km) {
        return km * 0.539957;
    }
    
    async function fetchAircraftNearby(lat, lon, radiusKm) {
        const radiusNm = kmToNm(radiusKm);
        // Limitar a máximo 250nm como especifica la API
        const finalRadius = Math.min(radiusNm, 250);
        const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${finalRadius}`;
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`Airplanes.live responded with status ${response.status}`);
            }
            const data = await response.json();
            if (!data || !data.ac || !Array.isArray(data.ac)) {
                return [];
            }
            // Filtrar aviones que tengan posición y altitud válidas
            const validAircraft = data.ac.filter(plane => {
                return plane.lat && plane.lon && (plane.alt_baro !== undefined || plane.alt_geom !== undefined);
            });
            return validAircraft;
        } catch (err) {
            console.error("Error fetching from airplanes.live:", err);
            throw err;
        }
    }
    
    // ----- Actualizar el mapa con los nuevos datos -----
    async function refreshAircraft() {
        if (!userLocation) {
            updateStatusMessage("Esperando GPS...", false);
            return;
        }
        if (isUpdating) return;
        isUpdating = true;
        updateStatusMessage("Buscando aviones...", true);
        
        const { lat, lon } = userLocation;
        try {
            // 1. Obtener lista de aviones cercanos
            const aircraftList = await fetchAircraftNearby(lat, lon, RADIO_KM);
            
            if (!aircraftList.length) {
                updateStatusMessage("✈️ Sin aviones en el área", false);
                document.getElementById('planeCount').innerText = "0";
                clearOldMarkers([]);
                isUpdating = false;
                return;
            }
            
            // 2. Para cada avión, obtener meteorología y clasificar riesgo
            const enrichedAircraft = [];
            for (const plane of aircraftList) {
                // Altitud en metros (priorizamos alt_baro, sino alt_geom)
                let altitudeMeters = plane.alt_baro || plane.alt_geom;
                if (!altitudeMeters) altitudeMeters = 10000; // fallback
                // Si alt_baro está en pies, convertir a metros (la API a veces da en pies, otras en metros)
                // Por pruebas: en airplanes.live alt_baro suele estar en pies.
                if (plane.alt_baro && plane.alt_baro < 60000 && plane.alt_baro > 0) {
                    // Asumimos pies si es menor a 60000 ft (18km)
                    altitudeMeters = plane.alt_baro * 0.3048;
                } else if (plane.alt_geom && plane.alt_geom < 20000) {
                    // Si viene en metros y es razonable
                    altitudeMeters = plane.alt_geom;
                }
                
                const weather = await fetchWeatherForAircraft(plane.lat, plane.lon, altitudeMeters);
                let risk = 'SIN DATOS';
                let temperature = null;
                let humidity = null;
                if (weather && weather.temp !== null && weather.rh !== null) {
                    temperature = weather.temp;
                    humidity = weather.rh;
                    risk = classifyRisk(weather.temp, weather.rh);
                }
                
                enrichedAircraft.push({
                    id: plane.hex || `${plane.lat}_${plane.lon}`,
                    lat: plane.lat,
                    lon: plane.lon,
                    altitudeM: altitudeMeters,
                    flight: plane.flight || "N/A",
                    callsign: plane.flight || plane.hex,
                    speed: plane.gs ? `${Math.round(plane.gs)} km/h` : "?",
                    risk: risk,
                    temp: temperature,
                    rh: humidity,
                    raw: plane
                });
            }
            
            // 3. Actualizar marcadores en el mapa
            updateMapMarkers(enrichedAircraft);
            document.getElementById('planeCount').innerText = enrichedAircraft.length;
            
            const now = new Date();
            document.getElementById('updateTime').innerHTML = now.toLocaleTimeString('es');
            updateStatusMessage(`✅ ${enrichedAircraft.length} aviones`, false);
            
        } catch (err) {
            console.error("Error en refreshAircraft:", err);
            updateStatusMessage(`Error: ${err.message.substring(0, 50)}`, false);
            document.getElementById('debugInfo').innerHTML = `⚠️ Error: ${err.message}`;
        } finally {
            isUpdating = false;
            setTimeout(() => {
                if (document.getElementById('statusBadge').innerText.includes("Buscando")) {
                    // Restaurar si se quedó colgado
                    updateStatusMessage("Activo", false);
                }
            }, 1000);
        }
    }
    
    // Actualizar los marcadores en el mapa (eficiente)
    function updateMapMarkers(aircraftList) {
        const currentIds = new Set(aircraftList.map(a => a.id));
        // Eliminar marcadores que ya no existen
        for (let [id, marker] of aircraftMarkers.entries()) {
            if (!currentIds.has(id)) {
                map.removeLayer(marker);
                aircraftMarkers.delete(id);
            }
        }
        
        // Agregar o actualizar marcadores existentes
        for (const plane of aircraftList) {
            const color = riskColors[plane.risk] || riskColors['SIN DATOS'];
            const popupContent = `
                <div style="font-family:sans-serif; font-size:12px; min-width:160px;">
                    <strong>✈️ ${plane.flight || plane.callsign || plane.id}</strong><br>
                    📍 ${plane.lat.toFixed(4)}, ${plane.lon.toFixed(4)}<br>
                    📏 Altitud: ${Math.round(plane.altitudeM)} m (${(plane.altitudeM*0.000539957).toFixed(1)} nm)<br>
                    💨 Velocidad: ${plane.speed}<br>
                    🌡️ Temp: ${plane.temp !== null ? plane.temp.toFixed(1) + '°C' : 'N/D'}<br>
                    💧 Humedad: ${plane.rh !== null ? plane.rh.toFixed(0) + '%' : 'N/D'}<br>
                    🟡 Riesgo de estela: <b style="color:${color};">${plane.risk}</b>
                </div>
            `;
            
            if (aircraftMarkers.has(plane.id)) {
                const marker = aircraftMarkers.get(plane.id);
                marker.setLatLng([plane.lat, plane.lon]);
                marker.setStyle({ fillColor: color });
                marker.bindPopup(popupContent);
            } else {
                const marker = L.circleMarker([plane.lat, plane.lon], {
                    radius: 6,
                    fillColor: color,
                    color: '#ffffff',
                    weight: 1.5,
                    opacity: 0.9,
                    fillOpacity: 0.85
                }).bindPopup(popupContent).addTo(map);
                aircraftMarkers.set(plane.id, marker);
            }
        }
    }
    
    function clearOldMarkers(keepIds = []) {
        for (let [id, marker] of aircraftMarkers.entries()) {
            if (!keepIds.includes(id)) {
                map.removeLayer(marker);
                aircraftMarkers.delete(id);
            }
        }
    }
    
    function updateStatusMessage(message, isActive) {
        const badge = document.getElementById('statusBadge');
        badge.innerText = message;
        if (isActive) {
            badge.classList.add('active');
        } else {
            badge.classList.remove('active');
        }
    }
    
    // ----- Geolocalización del usuario -----
    function initGeolocation() {
        if (!navigator.geolocation) {
            document.getElementById('posText').innerText = "No soportado";
            updateStatusMessage("GPS no soportado", false);
            return;
        }
        
        navigator.geolocation.watchPosition(
            (position) => {
                const { latitude, longitude, accuracy } = position.coords;
                userLocation = { lat: latitude, lon: longitude };
                document.getElementById('posText').innerHTML = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                updateStatusMessage("GPS OK", false);
                
                // Actualizar marcador del usuario
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([latitude, longitude], {
                    radius: 8,
                    fillColor: '#3b82f6',
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 0.9
                }).bindPopup("📍 Tu posición").addTo(map);
                
                // Centrar el mapa en el usuario
                map.setView([latitude, longitude], 9);
                
                // Primera carga rápida de aviones
                refreshAircraft();
                
                // Configurar intervalo si no existe
                if (updateInterval) clearInterval(updateInterval);
                updateInterval = setInterval(refreshAircraft, REFRESH_MS);
            },
            (error) => {
                let errorMsg = "Error GPS";
                if (error.code === 1) errorMsg = "Permiso denegado";
                else if (error.code === 2) errorMsg = "Señal no disponible";
                document.getElementById('posText').innerText = errorMsg;
                updateStatusMessage(errorMsg, false);
                // Si no hay GPS, intentar cargar igual con coordenadas de ejemplo (centro de España)
                if (!userLocation) {
                    userLocation = { lat: 40.4167, lon: -3.70325 };
                    document.getElementById('posText').innerHTML = "Demo: Madrid";
                    refreshAircraft();
                    if (updateInterval) clearInterval(updateInterval);
                    updateInterval = setInterval(refreshAircraft, REFRESH_MS);
                }
            },
            { enableHighAccuracy: true, maximumAge: 20000, timeout: 10000 }
        );
    }
    
    // ----- Inicialización completa -----
    function startApp() {
        initGeolocation();
        // Limpiar caché meteorológico cada 10 minutos para no acumular demasiado
        setInterval(() => {
            weatherCache.clear();
        }, 600000);
    }
    
    startApp();
</script>
</body>
</html>
