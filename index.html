<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radar Estelas Pro - Centrado inicial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .gear-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1001;
            border: 1px solid #4ade80;
            font-size: 26px;
            color: #4ade80;
            transition: 0.2s;
        }
        .gear-btn:hover { background: #1e3a2f; }
        
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 14px 18px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 260px;
            display: none;
            pointer-events: auto;
        }
        .control-panel.visible { display: block; }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .panel-header h3 {
            font-size: 1.2rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-panel {
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
        }
        .close-panel:hover { color: white; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .info-label { color: #aaa; }
        .info-value { font-weight: 600; color: white; }
        
        .slider-container { margin: 12px 0; }
        input[type="range"] {
            width: 100%;
            background: #2a5c8a;
            height: 3px;
            border-radius: 3px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .mode-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            background: #1e1e1e;
            padding: 8px 12px;
            border-radius: 40px;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: 0.3s;
            border-radius: 34px;
        }
        .slider-round:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider-round { background-color: #4ade80; }
        input:checked + .slider-round:before { transform: translateX(26px); }
        
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #333;
            font-size: 0.7rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 2px;
        }
        button {
            background: #2a5c8a;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 8px;
            width: 100%;
        }
        button:hover { background: #1e4a76; }
        .footer-note {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: #888;
            background: rgba(0,0,0,0.5);
            padding: 4px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="map"></div>

<div class="gear-btn" id="gearBtn"><i class="fas fa-cog"></i></div>

<div class="control-panel" id="controlPanel">
    <div class="panel-header">
        <h3><i class="fas fa-plane"></i> Radar Estelas Pro</h3>
        <button class="close-panel" id="closePanelBtn">&times;</button>
    </div>
    <div class="info-row">
        <span class="info-label">📍 Tu posición:</span>
        <span class="info-value" id="posText">--</span>
    </div>
    <div class="info-row">
        <span class="info-label">✈️ Aviones en zona:</span>
        <span class="info-value" id="planeCount">0</span>
    </div>
    <div class="info-row">
        <span class="info-label">🔄 Última búsqueda:</span>
        <span class="info-value" id="updateTime">--</span>
    </div>
    <div class="slider-container">
        <label>📡 Radio: <span id="radioValue">120</span> km</label>
        <input type="range" id="radioSlider" min="60" max="200" step="5" value="120">
    </div>
    <div class="mode-toggle">
        <span>🧠 Modo Experto (interpolación)</span>
        <label class="toggle-switch">
            <input type="checkbox" id="expertMode">
            <span class="slider-round"></span>
        </label>
    </div>
    <div class="legend">
        <div style="width:100%; margin-bottom:5px;"><strong>Probabilidad de estelas</strong></div>
        <div class="legend-item"><div class="legend-color" style="background:#00ff00;"></div><span>Nula</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ffff00;"></div><span>Baja</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff9800;"></div><span>Media</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff5722;"></div><span>Alta</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#ff0000;"></div><span>Muy Alta</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#888888;"></div><span>Sin datos</span></div>
    </div>
    <button id="centerBtn"><i class="fas fa-crosshairs"></i> Centrar en mi posición</button>
</div>
<div class="footer-note">🔍 Mueve el mapa → busca aviones automáticamente | Iconos orientados según rumbo</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
    // ================= CONFIGURACIÓN =================
    let map;
    let userLocation = null;
    let userMarker = null;
    let aircraftMarkers = new Map();
    let weatherCache = new Map();
    let isUpdating = false;
    let currentRadiusKm = 120;
    let expertMode = false;
    let currentMapCenter = null;
    let firstLocationFix = true;   // Para centrar solo la primera vez

    // Niveles de presión estándar con altitudes típicas (metros)
    const pressureLevels = [
        { press: 500, alt_m: 5574 }, { press: 400, alt_m: 7185 }, { press: 300, alt_m: 9164 },
        { press: 250, alt_m: 10363 }, { press: 200, alt_m: 11784 }, { press: 150, alt_m: 13608 },
        { press: 100, alt_m: 16184 }, { press: 70, alt_m: 18513 }, { press: 50, alt_m: 20600 }
    ];
    const usableLevels = pressureLevels.filter(l => l.press >= 70 && l.press <= 500);

    const riskColors = {
        'NULA': '#00ff00', 'BAJA': '#ffff00', 'MEDIA': '#ff9800',
        'ALTA': '#ff5722', 'MUY ALTA': '#ff0000', 'SIN DATOS': '#888888'
    };

    // Fórmulas de estelas (idénticas a tu programa)
    function toRHi(RHw, T_C) {
        const ew = 6.1078 * Math.exp(17.269 * T_C / (T_C + 237.29));
        const ei = 6.1078 * Math.exp(21.875 * T_C / (T_C + 265.5));
        return (RHw / 100) * (ew / ei) * 100;
    }
    function classifyRisk(T, RHw) {
        if (T === null || RHw === null) return 'SIN DATOS';
        if (T > -40) return 'NULA';
        const RHi = toRHi(RHw, T);
        const ts = T <= -50 ? 3 : T <= -45 ? 2 : 1;
        const rs = RHi >= 110 ? 4 : RHi >= 100 ? 3 : RHi >= 95 ? 2 : RHi >= 90 ? 1 : 0;
        const cpi = ts + rs;
        if (cpi >= 6) return 'MUY ALTA';
        if (cpi >= 5) return 'ALTA';
        if (cpi >= 3) return 'MEDIA';
        if (cpi >= 1) return 'BAJA';
        return 'NULA';
    }

    // Obtener meteorología para todos los niveles
    async function fetchAllWeatherData(lat, lon) {
        const cacheKey = `${lat.toFixed(3)}_${lon.toFixed(3)}`;
        const now = Date.now();
        if (weatherCache.has(cacheKey)) {
            const cached = weatherCache.get(cacheKey);
            if (now - cached.timestamp < 300000) return cached.data;
        }
        try {
            const tempVars = usableLevels.map(l => `temperature_${l.press}hPa`).join(',');
            const rhVars = usableLevels.map(l => `relative_humidity_${l.press}hPa`).join(',');
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=${tempVars},${rhVars}&timezone=UTC&forecast_days=1`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Weather error: ${response.status}`);
            const data = await response.json();
            const horaActual = new Date().getUTCHours();
            const weatherByPressure = {};
            for (let level of usableLevels) {
                const tempArray = data.hourly[`temperature_${level.press}hPa`];
                const rhArray = data.hourly[`relative_humidity_${level.press}hPa`];
                weatherByPressure[level.press] = {
                    temp: tempArray?.[horaActual] ?? null,
                    rh: rhArray?.[horaActual] ?? null,
                    alt_m: level.alt_m
                };
            }
            const result = { weatherByPressure, timestamp: now };
            weatherCache.set(cacheKey, { data: result, timestamp: now });
            return result;
        } catch (err) {
            console.error(err);
            return null;
        }
    }

    function findClosestPressureLevel(altMeters, weatherData) {
        if (!weatherData?.weatherByPressure) return null;
        let closest = null, minDiff = Infinity;
        for (let [press, info] of Object.entries(weatherData.weatherByPressure)) {
            const diff = Math.abs(info.alt_m - altMeters);
            if (diff < minDiff) { minDiff = diff; closest = { press: parseInt(press), alt_m: info.alt_m, temp: info.temp, rh: info.rh }; }
        }
        return closest;
    }

    function interpolateWeather(altMeters, weatherData) {
        if (!weatherData?.weatherByPressure) return null;
        const levels = Object.entries(weatherData.weatherByPressure).map(([p, i]) => ({ press: parseInt(p), alt_m: i.alt_m, temp: i.temp, rh: i.rh })).sort((a,b) => a.alt_m - b.alt_m);
        if (levels.length === 0) return null;
        if (altMeters <= levels[0].alt_m) return levels[0];
        if (altMeters >= levels[levels.length-1].alt_m) return levels[levels.length-1];
        for (let i = 0; i < levels.length-1; i++) {
            const lower = levels[i], upper = levels[i+1];
            if (altMeters >= lower.alt_m && altMeters <= upper.alt_m) {
                const ratio = (altMeters - lower.alt_m) / (upper.alt_m - lower.alt_m);
                const temp = (lower.temp !== null && upper.temp !== null) ? lower.temp + ratio * (upper.temp - lower.temp) : null;
                const rh = (lower.rh !== null && upper.rh !== null) ? lower.rh + ratio * (upper.rh - lower.rh) : null;
                return { temp, rh, alt_m: altMeters, press: `interp_${lower.press}-${upper.press}` };
            }
        }
        return null;
    }

    async function getRiskForAircraft(lat, lon, altMeters) {
        const weatherData = await fetchAllWeatherData(lat, lon);
        if (!weatherData) return { risk: 'SIN DATOS', temp: null, rh: null };
        const result = expertMode ? interpolateWeather(altMeters, weatherData) : findClosestPressureLevel(altMeters, weatherData);
        if (!result || result.temp === null || result.rh === null) return { risk: 'SIN DATOS', temp: null, rh: null };
        return { risk: classifyRisk(result.temp, result.rh), temp: result.temp, rh: result.rh, usedLevel: result.press };
    }

    async function fetchAircraftNearby(lat, lon, radiusKm) {
        const radiusNm = Math.min(radiusKm * 0.539957, 250);
        const url = `https://api.airplanes.live/v2/point/${lat}/${lon}/${radiusNm}`;
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (!data?.ac) return [];
            return data.ac.filter(p => p.lat && p.lon && (p.alt_baro || p.alt_geom));
        } catch (err) { console.error(err); return []; }
    }

    function getPlaneIcon(color, heading) {
        const html = `<div style="transform: rotate(${heading}deg); display: inline-block; font-size: 28px; color: ${color}; text-shadow: 0 0 2px black;"><i class="fas fa-plane"></i></div>`;
        return L.divIcon({ html: html, iconSize: [28, 28], className: 'plane-icon', popupAnchor: [0, -14] });
    }

    async function refreshAircraftAt(lat, lon) {
        if (isUpdating) return;
        isUpdating = true;
        try {
            const aircraftList = await fetchAircraftNearby(lat, lon, currentRadiusKm);
            const enriched = [];
            for (const plane of aircraftList) {
                let altM = plane.alt_baro || plane.alt_geom || 10000;
                if (plane.alt_baro && plane.alt_baro < 60000 && plane.alt_baro > 0) altM = plane.alt_baro * 0.3048;
                else if (plane.alt_geom && plane.alt_geom < 20000) altM = plane.alt_geom;
                const heading = plane.track || 0;
                const riskData = await getRiskForAircraft(plane.lat, plane.lon, altM);
                enriched.push({
                    id: plane.hex || `${plane.lat}_${plane.lon}`,
                    lat: plane.lat, lon: plane.lon, altitudeM: altM,
                    flight: plane.flight || "N/A", heading: heading,
                    risk: riskData.risk, temp: riskData.temp, rh: riskData.rh
                });
            }
            updateMarkers(enriched);
            document.getElementById('planeCount').innerText = enriched.length;
            document.getElementById('updateTime').innerHTML = new Date().toLocaleTimeString('es');
        } catch (err) { console.error(err); }
        finally { isUpdating = false; }
    }

    function updateMarkers(aircraftList) {
        const currentIds = new Set(aircraftList.map(a => a.id));
        for (let [id, obj] of aircraftMarkers.entries()) {
            if (!currentIds.has(id)) { map.removeLayer(obj.marker); aircraftMarkers.delete(id); }
        }
        for (const plane of aircraftList) {
            const color = riskColors[plane.risk] || riskColors['SIN DATOS'];
            const icon = getPlaneIcon(color, plane.heading);
            const popup = `<div style="font-size:12px;"><b>✈️ ${plane.flight}</b><br>Alt: ${Math.round(plane.altitudeM)} m<br>Temp: ${plane.temp?.toFixed(1) ?? 'N/D'}°C<br>Riesgo: <span style="color:${color}">${plane.risk}</span></div>`;
            if (aircraftMarkers.has(plane.id)) {
                const existing = aircraftMarkers.get(plane.id);
                existing.marker.setLatLng([plane.lat, plane.lon]);
                existing.marker.setIcon(icon);
                existing.marker.bindPopup(popup);
            } else {
                const marker = L.marker([plane.lat, plane.lon], { icon }).bindPopup(popup).addTo(map);
                aircraftMarkers.set(plane.id, { marker });
            }
        }
    }

    // Inicializar mapa y eventos
    function initMap() {
        map = L.map('map').setView([42.24, -8.72], 8); // vista temporal, luego se centrará en usuario
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);

        // Al mover el mapa, buscar aviones en el nuevo centro
        map.on('moveend', () => {
            const center = map.getCenter();
            currentMapCenter = { lat: center.lat, lon: center.lng };
            refreshAircraftAt(center.lat, center.lng);
        });
    }

    // Geolocalización: centrar solo la primera vez
    function initGeolocation() {
        if (!navigator.geolocation) {
            document.getElementById('posText').innerText = "No soportado";
            return;
        }
        navigator.geolocation.watchPosition(
            (pos) => {
                const { latitude, longitude } = pos.coords;
                userLocation = { lat: latitude, lon: longitude };
                document.getElementById('posText').innerHTML = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([latitude, longitude], {
                    radius: 10,
                    fillColor: '#3b82f6',
                    color: '#fff',
                    weight: 2,
                    fillOpacity: 0.9
                }).bindPopup("📍 Tu posición").addTo(map);
                
                // Centrar solo la primera vez que obtenemos la posición
                if (firstLocationFix) {
                    map.setView([latitude, longitude], 9);
                    firstLocationFix = false;
                    currentMapCenter = { lat: latitude, lon: longitude };
                    refreshAircraftAt(latitude, longitude);
                } else {
                    // Si ya explorábamos, solo actualizamos el marcador, no el centro.
                    if (!currentMapCenter) {
                        currentMapCenter = { lat: latitude, lon: longitude };
                        refreshAircraftAt(latitude, longitude);
                    }
                }
            },
            (err) => {
                document.getElementById('posText').innerText = "Permiso denegado";
                if (!currentMapCenter) {
                    currentMapCenter = { lat: 42.24, lon: -8.72 };
                    refreshAircraftAt(42.24, -8.72);
                }
            },
            { enableHighAccuracy: true, maximumAge: 20000, timeout: 10000 }
        );
    }

    // UI
    document.getElementById('gearBtn').onclick = () => document.getElementById('controlPanel').classList.toggle('visible');
    document.getElementById('closePanelBtn').onclick = () => document.getElementById('controlPanel').classList.remove('visible');
    document.getElementById('centerBtn').onclick = () => {
        if (userLocation) {
            map.setView([userLocation.lat, userLocation.lon], 9);
            refreshAircraftAt(userLocation.lat, userLocation.lon);
            currentMapCenter = { lat: userLocation.lat, lon: userLocation.lon };
        }
    };
    document.getElementById('radioSlider').oninput = (e) => {
        currentRadiusKm = parseInt(e.target.value);
        document.getElementById('radioValue').innerText = currentRadiusKm;
        if (currentMapCenter) refreshAircraftAt(currentMapCenter.lat, currentMapCenter.lon);
    };
    document.getElementById('expertMode').onchange = (e) => {
        expertMode = e.target.checked;
        weatherCache.clear();
        if (currentMapCenter) refreshAircraftAt(currentMapCenter.lat, currentMapCenter.lon);
    };

    initMap();
    initGeolocation();
    setInterval(() => weatherCache.clear(), 600000);
</script>
</body>
</html>
